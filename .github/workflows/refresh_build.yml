name: Hourly Refresh (lineups + weather + odds)
on:
  schedule:
    # Noon ET pass so early (12:15-1:10) games catch their confirmed lineups
    - cron: "0 16 * * *"
    # Hourly 1:30 PM - 7:30 PM ET (17:30-23:30 UTC during EDT):
    # picks up confirmed lineups and fresh weather until first pitch
    - cron: "30 17-23 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: onyx-build
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # full history: fetch_odds judges odds.json freshness by its last
          # commit time, which a shallow clone reports as "just now"
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Fetch fresh data
        run: python3 fetch_data.py
      - name: Fetch odds
        run: python3 fetch_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Fetch Onyx game links
        run: python3 fetch_onyx.py
        env:
          OPTICODDS_API_KEY: ${{ secrets.OPTICODDS_API_KEY }}
      - name: Heal pitcher hands
        run: python3 heal_hands.py
      - name: Build index.html
        run: python3 auto_build.py
      - name: Persist picks record
        run: python3 update_stats.py
      - name: Commit refresh (only if something changed)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data index.html
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "nothing to commit"
          else
            git commit -m "Refresh build $(date -u +%Y-%m-%dT%H:%M)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
