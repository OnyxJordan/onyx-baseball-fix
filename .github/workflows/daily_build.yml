name: Daily Onyx Build
on:
  schedule:
    # 11:30 AM ET = 15:30 UTC (EDT, Apr–Nov)
    - cron: "30 15 * * *"
  workflow_dispatch:  # allow manual trigger from Actions tab
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Fetch daily data
        run: python3 fetch_data.py
      - name: Fetch odds
        run: python3 fetch_odds.py
      - name: Heal pitcher hands
        run: python3 heal_hands.py
      - name: Build index.html
        run: python3 auto_build.py
      - name: Persist picks & DFS record
        run: python3 update_stats.py
      - name: Commit refreshed data & index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data index.html
          git commit -m "Daily build $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
